<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: Helvetica Neue, Helvetica,Arial,sans-serif;
            display: flex;
            /* align-items: center; */
            justify-content: center;
            background-color: white;
        }
        .container{
            margin-top: 6cap;
            align-items: center;
            width: 350px;
            height: auto;
            background-color: lightblue;
            padding-bottom: 80px;
            border-radius: 20px;
            box-shadow: 5px 10px 10px #888888;
        }
        form{
            padding-left: 36px;
            width: 80%;
        }
        .head{
            margin-top: 40px;
            align-items: center;
            text-align: center;
            font-size: x-large;
            margin-bottom: 30px;
        }
        .content{
            display: flex;
            flex-direction: column;
        }
        .iput1{
            height: 37px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid lightgray;
            padding-left: 12px;
            font-size: 12px;
        }
        button{
            width: 72%;
            margin-left: 35px;
            height: 37px;
            border-radius: 12px;
            border: 1px solid rgb(117, 192, 105);
            color: white;
            background-color: rgb(119, 215, 119);
            box-shadow: 3px 3px 5px #3b563d;
        }
        .signup{
            font-size: 10px;
            text-align: center;
            padding-top: 7px;
        }
        .signup > a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="head">
            Create An Account
        </div>
        <form action="" class="forms">
            <div class="content">
                <input class="iput1" type="text" name="" id="" placeholder="User Name">
                <input class="iput1" type="password" name="" id="" placeholder="Password">          
            </div>
            <button>Create Account</button>
        </form>
        <div class="signup">
            Alredy have an account?<a href="">Sign in</a>
        </div>
    </div>
</body>
</html>
